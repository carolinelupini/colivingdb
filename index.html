<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>colivingDB — find colivings anywhere</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GBDMVK7LWL"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --ink:#1a2333; --muted:#5b6779; --line:#e5e9f0; --bg:#f7f9fc; --card:#ffffff;
    --accent:#0e7c66; --accent-soft:#e2f3ef; --warn:#8a6d1a; --warn-bg:#fdf6e0;
    --pop:#b4531a; --pop-bg:#fbeadd; --prog:#3b4fd8; --prog-bg:#eef2ff;
    --rowhover:#f2f7f5;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:var(--bg);}
  a{color:var(--accent);}

  header{background:var(--card); border-bottom:1px solid var(--line); padding:14px 22px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; position:sticky; top:0; z-index:1001;}
  .logo{font-size:1.25rem; font-weight:800; letter-spacing:-.02em;}
  .logo span{color:var(--accent);}
  .tagline{color:var(--muted); font-size:.85rem;}
  #search{margin-left:auto; padding:8px 14px; border:1px solid var(--line); border-radius:8px; font-size:.9rem; width:260px; max-width:100%;}
  #search:focus{outline:2px solid var(--accent-soft); border-color:var(--accent);}

  .filters{padding:12px 22px; display:flex; gap:10px 12px; align-items:center; flex-wrap:wrap; background:var(--card); border-bottom:1px solid var(--line);}
  .frow{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .chip{border:1px solid var(--line); background:var(--card); border-radius:999px; padding:6px 13px; font-size:.83rem; cursor:pointer; color:var(--ink); transition:all .12s;}
  .chip:hover{border-color:var(--accent);}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff;}
  .chip.tag.on{background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}
  .sep{width:1px; height:22px; background:var(--line);}
  select{padding:6px 10px; border:1px solid var(--line); border-radius:8px; font-size:.83rem; background:var(--card); color:var(--ink);}
  label.toggle{font-size:.82rem; color:var(--muted); display:flex; align-items:center; gap:6px; cursor:pointer;}
  #reset{background:none; border:none; color:var(--muted); font-size:.8rem; cursor:pointer; text-decoration:underline;}
  #count{font-size:.83rem; color:var(--muted); margin-left:auto; white-space:nowrap;}
  #count b{color:var(--ink);}

  #map{height:40vh; min-height:260px; z-index:1;}

  /* columnar list — same fields aligned in every row */
  .list{background:var(--card);}
  .cols{display:grid; grid-template-columns:minmax(0,2.5fr) 0.9fr 1.25fr 1.15fr auto; gap:16px; align-items:center;}
  .list-head{padding:11px 22px; border-bottom:1px solid var(--line); font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); background:var(--bg);}
  .list-head .r-price, .row .r-price{text-align:right;}
  .list-head .r-link{min-width:74px;}
  .row{padding:13px 22px; border-bottom:1px solid var(--line); cursor:default;}
  .row:hover{background:var(--rowhover);}
  .row.hl{background:var(--accent-soft);}

  .r-name .nm{font-size:.98rem; font-weight:650; line-height:1.2;}
  .r-name .loc{color:var(--muted); font-size:.8rem; margin-top:2px;}
  .r-name .tags{display:flex; flex-wrap:wrap; gap:4px; margin-top:5px;}
  .r-name .dates{font-size:.76rem; color:var(--pop); background:var(--pop-bg); border-radius:6px; padding:3px 7px; margin-top:6px; line-height:1.35; display:inline-block;}
  .t{background:var(--bg); border:1px solid var(--line); color:var(--muted); border-radius:6px; font-size:.68rem; padding:1px 6px;}

  .b{border-radius:6px; font-size:.68rem; padding:2px 7px; font-weight:600; white-space:nowrap; display:inline-block;}
  .b-perm{background:var(--accent-soft); color:var(--accent);}
  .b-pop{background:var(--pop-bg); color:var(--pop);}
  .b-prog{background:var(--prog-bg); color:var(--prog);}
  .b-unclear{background:#fbeaea; color:#9a3838; margin-top:4px;}

  .r-rooms{display:flex; flex-wrap:wrap; gap:4px; font-size:.72rem;}
  .rm{border:1px solid var(--line); border-radius:6px; padding:1px 7px; color:var(--muted);}
  .rm.dorm{background:var(--accent-soft); color:var(--accent); border-color:var(--accent);}

  .r-price .from{font-weight:750; font-size:.98rem;}
  .r-price .from small{font-weight:400; color:var(--muted); font-size:.72rem;}
  .r-price .brk{font-size:.72rem; color:var(--muted); margin-top:2px; line-height:1.3;}
  .r-price .brk b{font-weight:600; color:var(--ink);}
  .r-price .onreq{font-size:.78rem; color:var(--muted);}

  .r-link a{font-size:.83rem; font-weight:600; text-decoration:none; white-space:nowrap; display:block;}
  .r-link .sched{font-size:.76rem; font-weight:500; margin-top:3px;}
  .r-link .none{color:var(--muted); font-size:.78rem; font-weight:400;}

  .empty{padding:40px 22px; text-align:center; color:var(--muted);}
  footer{padding:18px 22px 40px; color:var(--muted); font-size:.78rem; line-height:1.6; background:var(--card); border-top:1px solid var(--line);}

  @media (max-width:760px){
    #search{width:100%; margin-left:0;} #count{margin-left:0;}
    .list-head{display:none;}
    .cols{grid-template-columns:1fr auto; gap:6px 14px;}
    .row .r-type{grid-column:2; grid-row:1; justify-self:end;}
    .row .r-name{grid-column:1; grid-row:1;}
    .row .r-rooms{grid-column:1; grid-row:2;}
    .row .r-price{grid-column:2; grid-row:2; text-align:right;}
    .row .r-link{grid-column:1 / -1; grid-row:3; margin-top:4px;}
    .r-link a{display:inline;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">coliving<span>DB</span></div>
  <div class="tagline">every coliving, one map, no questions asked</div>
  <input id="search" type="search" placeholder="Search name, city, country…" autocomplete="off">
</header>

<div class="filters">
  <div class="frow" id="regions"></div>
  <span class="sep"></span>
  <select id="country" autocomplete="off"><option value="">All countries</option></select>
  <select id="room" autocomplete="off">
    <option value="">Any room</option>
    <option value="private">Private room</option>
    <option value="shared">Shared room</option>
    <option value="dorm">Dorm available</option>
  </select>
  <select id="format" autocomplete="off">
    <option value="">All types</option>
    <option value="permanent">Permanent</option>
    <option value="pop-up">Pop-ups</option>
    <option value="program">Moving programs</option>
  </select>
  <span class="sep"></span>
  <div class="frow" id="tags"></div>
  <span class="sep"></span>
  <select id="price" autocomplete="off">
    <option value="">Any price</option>
    <option value="600">≤ €600/mo</option>
    <option value="900">≤ €900/mo</option>
    <option value="1200">≤ €1200/mo</option>
    <option value="2000">≤ €2000/mo</option>
  </select>
  <label class="toggle"><input type="checkbox" id="hideUnclear" autocomplete="off"> Hide unconfirmed</label>
  <button id="reset">reset</button>
  <div id="count"></div>
</div>

<div id="map"></div>

<div class="list">
  <div class="list-head cols">
    <div class="r-name">Coliving</div>
    <div class="r-type">Type</div>
    <div class="r-rooms">Rooms</div>
    <div class="r-price">Price / month</div>
    <div class="r-link"></div>
  </div>
  <div id="rows"></div>
</div>
<div class="empty" id="empty" style="display:none">Nothing matches — loosen a filter.</div>

<footer id="footer"></footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script>
const C = (window.COLIVINGS || []);
const REGIONS = ["All","Europe","Asia","Latin America","Africa","North America","Oceania","Middle East"];
const tagFreq = {};
C.forEach(x => (x.tags||[]).forEach(t => tagFreq[t] = (tagFreq[t]||0)+1));
const TAGS = Object.keys(tagFreq).sort((a,b)=>tagFreq[b]-tagFreq[a]);

const state = {region:"All", country:"", room:"", format:"", tags:new Set(), price:"", q:"", hideUnclear:false};

document.getElementById("footer").innerHTML =
  `<b>colivingDB</b> indexes ${C.length} coliving spaces worldwide — permanent homes, seasonal pop-ups, and moving programs. Prices are approximate, in EUR per month, and change often; pop-up dates shift season to season. Always confirm details on the operator's own site before booking. Map data © OpenStreetMap contributors.`;

// region chips
const regionsEl = document.getElementById("regions");
REGIONS.filter(r => r==="All" || C.some(x=>x.region===r)).forEach(r=>{
  const b=document.createElement("button"); b.className="chip"+(r==="All"?" on":""); b.textContent=r;
  b.onclick=()=>{state.region=r; state.country=""; document.getElementById("country").value=""; render();};
  regionsEl.appendChild(b);
});
// tag chips
const tagsEl = document.getElementById("tags");
TAGS.forEach(t=>{
  const b=document.createElement("button"); b.className="chip tag"; b.textContent=t;
  b.onclick=()=>{state.tags.has(t)?state.tags.delete(t):state.tags.add(t); render();};
  tagsEl.appendChild(b);
});
// country dropdown
const countrySel=document.getElementById("country");
[...new Set(C.map(x=>x.country))].sort().forEach(k=>{
  const o=document.createElement("option"); o.value=k; o.textContent=k; countrySel.appendChild(o);
});
countrySel.onchange=e=>{state.country=e.target.value; render();};
document.getElementById("room").onchange=e=>{state.room=e.target.value; render();};
document.getElementById("format").onchange=e=>{state.format=e.target.value; render();};
document.getElementById("price").onchange=e=>{state.price=e.target.value; render();};
document.getElementById("hideUnclear").onchange=e=>{state.hideUnclear=e.target.checked; render();};
document.getElementById("search").oninput=e=>{state.q=e.target.value.toLowerCase(); render();};

function resetFilters(){
  Object.assign(state,{region:"All",country:"",room:"",format:"",price:"",q:"",hideUnclear:false}); state.tags.clear();
  ["country","room","format","price"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("search").value=""; document.getElementById("hideUnclear").checked=false;
  render();
}
document.getElementById("reset").onclick=resetFilters;
window.addEventListener("pageshow", resetFilters);

// map
const map = L.map("map",{scrollWheelZoom:true}).setView([25,10],2);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap", maxZoom:18}).addTo(map);
window.addEventListener("resize", () => map.invalidateSize());
let markers=[];

function hasRoom(x, room){
  if(room==="dorm") return x.dormAvailable || (x.roomTypes||[]).includes("dorm");
  return (x.roomTypes||[]).includes(room);
}
function filtered(){
  return C.filter(x=>
    (state.region==="All"||x.region===state.region) &&
    (!state.country||x.country===state.country) &&
    (!state.room||hasRoom(x,state.room)) &&
    (!state.format||x.format===state.format) &&
    (!state.price||(x.priceEurMonthly&&x.priceEurMonthly<=+state.price)) &&
    (!state.hideUnclear||x.status==="active") &&
    ([...state.tags].every(t=>(x.tags||[]).includes(t))) &&
    (!state.q||((x.name+" "+(x.city||"")+" "+x.country).toLowerCase().includes(state.q)))
  );
}

function priceCell(x){
  const p = x.prices||{};
  let main;
  if(state.room && p[state.room]) main = `<div class="from">€${p[state.room]}<small>/mo (${state.room})</small></div>`;
  else if(x.priceEurMonthly) main = `<div class="from">€${x.priceEurMonthly}<small>/mo from</small></div>`;
  else return `<div class="onreq">${x.priceNote ? x.priceNote : "on request"}</div>`;
  const order=["dorm","shared","private"];
  const parts = order.filter(k=>p[k]).map(k=>`<b>${k}</b> €${p[k]}`);
  const brk = parts.length>1 ? `<div class="brk">${parts.join(" · ")}</div>` : "";
  return main + brk;
}
function typeCell(x){
  const cls = x.format==="pop-up"?"b-pop":(x.format==="program"?"b-prog":"b-perm");
  const label = x.format==="pop-up"?"◷ pop-up":(x.format==="program"?"↔ program":"permanent");
  return `<span class="b ${cls}">${label}</span>`
    + (x.status!=="active"?`<br><span class="b b-unclear">⚠ unconfirmed</span>`:"");
}
function roomsCell(x){
  const rts = x.roomTypes||[];
  if(!rts.length && !x.dormAvailable) return `<span style="color:var(--muted);font-size:.72rem">—</span>`;
  const set = new Set(rts); if(x.dormAvailable) set.add("dorm");
  const order=["dorm","private","shared","studio","apartment"];
  const sorted=[...set].sort((a,b)=>(order.indexOf(a)+99)%100-(order.indexOf(b)+99)%100);
  return sorted.map(r=>`<span class="rm ${r==="dorm"?"dorm":""}">${r}</span>`).join("");
}

function render(){
  document.querySelectorAll("#regions .chip").forEach(b=>b.classList.toggle("on",b.textContent===state.region));
  document.querySelectorAll("#tags .chip").forEach(b=>b.classList.toggle("on",state.tags.has(b.textContent)));
  const list=filtered();
  document.getElementById("count").innerHTML=`Showing <b>${list.length}</b> of ${C.length} colivings`;

  markers.forEach(m=>map.removeLayer(m)); markers=[];
  const rowsEl=document.getElementById("rows"); rowsEl.innerHTML="";
  document.getElementById("empty").style.display=list.length?"none":"block";

  const withCoords=[];
  list.forEach((x,i)=>{
    if(x.lat!=null && x.lng!=null && x.format!=="program"){
      const col = x.format==="pop-up" ? "#b4531a" : (x.status!=="active" ? "#b07d1a" : "#0e7c66");
      const fill = x.format==="pop-up" ? "#e0894a" : (x.status!=="active" ? "#e0b04a" : "#0e7c66");
      const m=L.circleMarker([x.lat,x.lng],{radius:7,color:col,weight:2,fillColor:fill,fillOpacity:.55})
        .addTo(map)
        .bindPopup(`<b>${x.name}</b><br>${x.city?x.city+", ":""}${x.country}${x.priceEurMonthly?`<br>from ~€${x.priceEurMonthly}/mo`:""}`);
      m.on("click",()=>{
        document.querySelectorAll(".row").forEach(c=>c.classList.remove("hl"));
        const row=document.getElementById("row-"+i);
        if(row){row.classList.add("hl"); row.scrollIntoView({behavior:"smooth",block:"center"});}
      });
      markers.push(m); withCoords.push(m); x.__m=m;
    } else { x.__m=null; }

    const loc = x.format==="program" ? (x.city||"Rotating") : `${x.city?x.city+", ":""}${x.country}`;
    const tagsHtml = (x.tags||[]).slice(0,5).map(t=>`<span class="t">${t}</span>`).join("");
    const datesHtml = (x.format==="pop-up"&&x.popupDates) ? `<div class="dates">◷ ${x.popupDates}</div>` : "";
    const linkHtml = (x.url?`<a href="${x.url}" target="_blank" rel="noopener">Visit →</a>`:`<span class="none">no site</span>`)
      + (x.format==="program"&&x.scheduleUrl?`<a class="sched" href="${x.scheduleUrl}" target="_blank" rel="noopener">Schedule →</a>`:"");

    const row=document.createElement("div"); row.className="row cols"; row.id="row-"+i;
    row.innerHTML=`
      <div class="r-name">
        <div class="nm">${x.name}</div>
        <div class="loc">${loc} · ${x.region}</div>
        ${tagsHtml?`<div class="tags">${tagsHtml}</div>`:""}
        ${datesHtml}
      </div>
      <div class="r-type">${typeCell(x)}</div>
      <div class="r-rooms">${roomsCell(x)}</div>
      <div class="r-price">${priceCell(x)}</div>
      <div class="r-link">${linkHtml}</div>`;
    if(x.__m){
      row.onmouseenter=()=>x.__m.setStyle({radius:10,fillOpacity:.9});
      row.onmouseleave=()=>x.__m.setStyle({radius:7,fillOpacity:.55});
    }
    rowsEl.appendChild(row);
  });

  if(withCoords.length){
    const filtering = state.region!=="All"||state.country||state.room||state.format||state.q||state.tags.size||state.price||state.hideUnclear;
    map.fitBounds(L.featureGroup(withCoords).getBounds().pad(filtering?0.25:0.02),{maxZoom:filtering?9:5});
  }
}
render();
</script>
</body>
</html>
